{% extends "base.html" %}
{% block title %}Nueva contraseña{% endblock %}
{% block content %}
<div style="max-width:420px;margin:3rem auto;">
    <div class="card">
        <div style="text-align:center;margin-bottom:2rem;">
            <div style="font-size:2.5rem;margin-bottom:.75rem;">🔒</div>
            <h1 style="font-size:1.5rem;font-weight:800;">Nueva contraseña</h1>
        </div>
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Nueva contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
            </div>
            <div class="form-group">
                <label class="form-label">Confirmar contraseña</label>
                <input type="password" name="confirmar_password" class="form-control" placeholder="Repite la contraseña" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.8rem;">Actualizar contraseña</button>
        </form>
    </div>
</div>
{% endblock %}
