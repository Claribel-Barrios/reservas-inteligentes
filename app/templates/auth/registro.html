{% extends "base.html" %}

{% block title %}Registro{% endblock %}

{% block extra_css %}
<style>

    body{
        background: linear-gradient(135deg,#2563eb 0%,#4f46e5 100%);
    }

    .register-container{
        min-height: calc(100vh - 64px);
        display:flex;
        align-items:center;
        justify-content:center;
        padding:2rem 1rem;
    }

    .register-card{
        width:100%;
        max-width:460px;
        background:#fff;
        border-radius:20px;
        padding:2.2rem;
        box-shadow:0 20px 50px rgba(0,0,0,.12);
        border:1px solid rgba(255,255,255,.2);
        animation:fadeIn .35s ease;
    }

    @keyframes fadeIn{
        from{
            opacity:0;
            transform:translateY(10px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

    .register-header{
        text-align:center;
        margin-bottom:2rem;
    }

    .register-icon{
        width:85px;
        height:85px;
        margin:0 auto 1rem;
        border-radius:50%;
        background:rgba(37,99,235,.1);
        color:var(--primary);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:2rem;
    }

    .register-title{
        font-size:1.7rem;
        font-weight:800;
        color:var(--text);
        margin-bottom:.5rem;
    }

    .register-subtitle{
        color:var(--muted);
        font-size:.95rem;
        line-height:1.5;
    }

    .form-group{
        margin-bottom:1.15rem;
    }

    .form-label{
        display:flex;
        align-items:center;
        gap:.5rem;
        margin-bottom:.55rem;
        font-size:.82rem;
        font-weight:700;
        color:var(--muted);
        text-transform:uppercase;
        letter-spacing:.05em;
    }

    .form-control{
        width:100%;
        padding:.95rem 1rem;
        border-radius:12px;
        border:1px solid var(--border);
        font-size:.95rem;
        background:#fff;
        transition:all .2s ease;
    }

    .form-control:focus{
        border-color:var(--primary);
        box-shadow:0 0 0 4px rgba(37,99,235,.12);
    }

    .btn-register{
        width:100%;
        justify-content:center;
        padding:.95rem;
        font-size:.95rem;
        font-weight:700;
        border-radius:12px;
        margin-top:.4rem;
    }

    .login-link{
        text-align:center;
        margin-top:1.5rem;
        font-size:.9rem;
        color:var(--muted);
    }

    .login-link a{
        color:var(--primary);
        text-decoration:none;
        font-weight:700;
    }

    .login-link a:hover{
        text-decoration:underline;
    }

    @media(max-width:500px){

        .register-card{
            padding:1.7rem;
        }

        .register-title{
            font-size:1.45rem;
        }

    }

</style>
{% endblock %}

{% block content %}

<div class="register-container">

    <div class="register-card">

        <div class="register-header">

            <div class="register-icon">
                <i class="fa-solid fa-user-plus"></i>
            </div>

            <h1 class="register-title">
                Crear cuenta
            </h1>

            <p class="register-subtitle">
                Regístrate para comenzar a gestionar tus reservas
                de forma rápida y segura.
            </p>

        </div>

        <form method="POST" autocomplete="off">

            <div class="form-group">

                <label class="form-label">
                    <i class="fa-solid fa-user"></i>
                    Nombre completo
                </label>

                <input
                    type="text"
                    name="nombre"
                    class="form-control"
                    placeholder="Tu nombre completo"
                    required
                    autofocus>

            </div>

            <div class="form-group">

                <label class="form-label">
                    <i class="fa-solid fa-envelope"></i>
                    Correo electrónico
                </label>

                <input
                    type="email"
                    name="correo"
                    class="form-control"
                    placeholder="usuario@gmail.com"
                    required
                    autocomplete="off">

            </div>

            <div class="form-group">

                <label class="form-label">
                    <i class="fa-solid fa-phone"></i>
                    Teléfono
                </label>

                <input
                    type="tel"
                    name="telefono"
                    class="form-control"
                    placeholder="300 123 4567">

            </div>

            <div class="form-group">

                <label class="form-label">
                    <i class="fa-solid fa-lock"></i>
                    Contraseña
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Mínimo 8 caracteres"
                    required>

            </div>

            <div class="form-group">

                <label class="form-label">
                    <i class="fa-solid fa-shield-halved"></i>
                    Confirmar contraseña
                </label>

                <input
                    type="password"
                    name="confirmar_password"
                    class="form-control"
                    placeholder="Repite tu contraseña"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-primary btn-register">

                <i class="fa-solid fa-user-check"></i>
                Crear cuenta

            </button>

        </form>

        <div class="login-link">

            ¿Ya tienes una cuenta?

            <a href="{{ url_for('auth.login') }}">
                Inicia sesión
            </a>

        </div>

    </div>

</div>

{% endblock %}
```
