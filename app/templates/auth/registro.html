{% extends "base.html" %}
{% block title %}Registro{% endblock %}
{% block content %}
<div style="max-width:440px;margin:3rem auto;">
    <div class="card">
        <div style="text-align:center;margin-bottom:2rem;">
            <div style="font-size:2.5rem;margin-bottom:.75rem;">👤</div>
            <h1 style="font-size:1.5rem;font-weight:800;">Crear cuenta</h1>
            <p style="color:var(--muted);font-size:.9rem;margin-top:.35rem;">Regístrate para comenzar a hacer reservas</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label class="form-label">Nombre completo</label>
                <input type="text" name="nombre" class="form-control" placeholder="Tu nombre" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Correo electrónico</label>
                <input type="email" name="correo" class="form-control" placeholder="tu@correo.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Teléfono (opcional)</label>
                <input type="tel" name="telefono" class="form-control" placeholder="300 123 4567">
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
            </div>
            <div class="form-group">
                <label class="form-label">Confirmar contraseña</label>
                <input type="password" name="confirmar_password" class="form-control" placeholder="Repite tu contraseña" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.8rem;margin-top:.5rem;">Crear cuenta</button>
        </form>

        <div style="text-align:center;margin-top:1.5rem;font-size:.875rem;color:var(--muted);">
            ¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}" style="color:var(--primary);text-decoration:none;font-weight:600;">Inicia sesión</a>
        </div>
    </div>
</div>
{% endblock %}
