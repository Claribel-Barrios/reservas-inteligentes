{% extends "base.html" %}
{% block title %}Recuperar contraseña{% endblock %}
{% block content %}
<div style="max-width:420px;margin:3rem auto;">
    <div class="card">
        <div style="text-align:center;margin-bottom:2rem;">
            <div style="font-size:2.5rem;margin-bottom:.75rem;">🔑</div>
            <h1 style="font-size:1.5rem;font-weight:800;">Recuperar contraseña</h1>
            <p style="color:var(--muted);font-size:.9rem;margin-top:.35rem;">Ingresa tu correo y recibirás un enlace de recuperación</p>
        </div>
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Correo electrónico</label>
                <input type="email" name="correo" class="form-control" placeholder="tu@correo.com" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.8rem;">Enviar enlace</button>
        </form>
        <div style="text-align:center;margin-top:1.5rem;font-size:.875rem;">
            <a href="{{ url_for('auth.login') }}" style="color:var(--muted);text-decoration:none;">← Volver al login</a>
        </div>
    </div>
</div>
{% endblock %}
