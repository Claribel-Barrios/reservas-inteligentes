{% extends "base.html" %}
{% block title %}{% if servicio %}Editar Servicio{% else %}Nuevo Servicio{% endif %}{% endblock %}
{% block content %}
<div style="max-width:560px;">
    <div class="page-header">
        <h1>{% if servicio %}✏️ Editar Servicio{% else %}➕ Nuevo Servicio{% endif %}</h1>
    </div>

    <div class="card">
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Nombre del servicio *</label>
                <input type="text" name="nombre" class="form-control" value="{{ servicio.nombre if servicio else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control">{{ servicio.descripcion if servicio else '' }}</textarea>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label class="form-label">Duración (minutos)</label>
                    <input type="number" name="duracion_minutos" class="form-control" value="{{ servicio.duracion_minutos if servicio else 60 }}" min="15">
                </div>
                <div class="form-group">
                    <label class="form-label">Precio ($)</label>
                    <input type="number" name="precio" class="form-control" value="{{ servicio.precio if servicio else 0 }}" min="0" step="1000">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Categoría</label>
                <select name="categoria" class="form-control">
                    <option value="">Sin categoría</option>
                    {% for cat in ['Salud', 'Deportes', 'Educación', 'Espacios', 'Restaurantes', 'Tecnología', 'Otro'] %}
                    <option value="{{ cat }}" {% if servicio and servicio.categoria == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            {% if servicio %}
            <div class="form-group">
                <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;">
                    <input type="checkbox" name="activo" {% if servicio.activo %}checked{% endif %}> Servicio activo
                </label>
            </div>
            {% endif %}
            <div style="display:flex;gap:.75rem;margin-top:.5rem;">
                <button type="submit" class="btn btn-primary">
                    {% if servicio %}Guardar cambios{% else %}Crear servicio{% endif %}
                </button>
                <a href="{{ url_for('admin.servicios') }}" class="btn btn-outline">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
